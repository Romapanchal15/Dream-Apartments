<!DOCTYPE html>
<html>
<head>
    <title>Projects - Dream Apartments</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef3f9;
        }

       
        .header {
            background: linear-gradient(45deg, navy, purple);
            color: white;
            text-align: center;
            padding: 15px;
        }

       
        .nav a {
            display: inline;
            margin: 15px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .nav a:hover {
            color: yellow;
        }

        
        .section {
            padding: 30px;
            text-align: center;
        }

        
        .project-card {
            display: inline-block;
            width: 280px;
            margin: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px gray;
            overflow: hidden;
            transition: 0.3s;
        }

        .project-card:hover {
            transform: scale(1.05);
        }

        .project-card img {
            width: 100%;
            height: 180px;
        }

        .project-content {
            padding: 15px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

       
        .btn {
            display: inline-block;
            padding: 10px;
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }

        
        .modal {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 15px;
            animation: fadeIn 0.5s;
            text-align: center;
        }

        

        .close {
            float: right;
            font-size: 20px;
            cursor: pointer;
        }

        
        .gallery img {
            width: 90px;
            height: 60px;
            margin: 5px;
            border-radius: 5px;
        }

        
        input {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 8px;
        }

        button {
            background: purple;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        
        .footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
        }

    </style>
</head>

<body>

    
    <div class="header">
        <h2>Our Premium Projects</h2>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    
    <div class="section">

        
        <div class="project-card">
            <img src="./photos/2-BHK.jpg">
            <div class="project-content">
                <h3>2BHK Apartment</h3>
                <p>Mumbai</p>
                <p class="price">₹70 Lakhs</p>
                <div class="btn" onclick="openModal('modal1')">View Details</div>
            </div>
        </div>

       
        <div class="project-card">
            <img src="./photos/3bhk.jpg">
            <div class="project-content">
                <h3>3BHK Apartment</h3>
                <p>Pune</p>
                <p class="price">₹95 Lakhs</p>
                <div class="btn" onclick="openModal('modal2')">View Details</div>
            </div>
        </div>

        
        <div class="project-card">
            <img src="./photos/luxuary apartments.jpg">
            <div class="project-content">
                <h3>Luxury Flat</h3>
                <p>Nagpur</p>
                <p class="price">₹60 Lakhs</p>
                <div class="btn" onclick="openModal('modal3')">View Details</div>
            </div>
        </div>

    </div>


    
    <div class="footer">
        <p>© 2026 Dream Apartments</p>
    </div>

   
</body>
</html>
